# This is a sample Supabase configuration file for enabling OrioleDB

[postgres_config]
# Enable OrioleDB support in PostgreSQL configuration
shared_preload_libraries = 'pg_stat_statements,orioledb'

# Configure OrioleDB memory settings
# Adjust these values based on your server specifications
orioledb.main_buffers = '256MB'      # Memory for data caching
orioledb.undo_buffers = '32MB'       # Memory for undo operations
orioledb.shared_pool_size = '64MB'   # Shared memory pool
orioledb.recovery_queue_size = '1GB' # Space for recovery operations

# WAL and checkpointing settings
max_wal_size = '4GB'                 # Increased WAL size for better performance
checkpoint_timeout = '10min'         # Time between checkpoints

[api]
# No specific API settings needed for OrioleDB

[auth]
# No specific auth settings needed for OrioleDB

[storage]
# No specific storage settings needed for OrioleDB

# Database extensions
[postgres_extensions]
orioledb = true                      # Enable the OrioleDB extension

# Function permissions
[function_permissions]
# No specific function permissions needed for OrioleDB
